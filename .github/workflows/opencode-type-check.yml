name: OpenCode Plugin Type Check

permissions:
  contents: read

on:
  push:
    branches: [main, master]
    paths:
      - 'agent-support/opencode/**'
  pull_request:
    paths:
      - 'agent-support/opencode/**'

jobs:
  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-support/opencode

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: agent-support/opencode/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run type check
        run: yarn type-check

